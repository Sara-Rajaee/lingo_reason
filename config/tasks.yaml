tasks:
  mmmlu:
    benchmark_type: "mmmlu"
    dataset_name: "CohereLabs/Global-MMLU-Lite"
    split: "test"
    subsets: ["en", 'de', 'zh', 'ar', "bn"] 
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 400 #400
  
  wmt24pp:
    benchmark_type: "wmt24pp"
    dataset_name: "google/wmt24pp"
    split: "train"
    subsets: ["en-ar_SA", "en-zh_CN", "en-bn_IN", "en-de_DE"] 
    defaults:
      batch_size: 128
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 998 #998
      filter_bad: false
      src_lang: "English" 
      include_comet: false

  polymath:
    benchmark_type: "polymath"
    dataset_name: "Qwen/PolyMath"
    split: "low" #should be top, high, medium, or low
    subsets: ["en", "de", "ar", "zh", "bn"]
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 400 #400

  mulr:
    benchmark_type: "mulr"
    dataset_name: "mulr"
    subsets: ["en", "de", "zh"] #["zh", "cs", "nl", "en", "et", "fr", "de", "ja", "ko", "fa", "pt", "ru", "es", "sv", "uk"] 
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 90
