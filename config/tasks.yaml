tasks:
  mmmlu:
    benchmark_type: "mmmlu"
    dataset_name: "CohereLabs/Global-MMLU-Lite"
    split: "test"
    subsets: ["en", 'de', 'zh', 'ar', "bn", "fr", "ja", "ko", "pt", "es"] 
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 400 #400
  
  wmt24pp:
    benchmark_type: "wmt24pp"
    dataset_name: "google/wmt24pp"
    split: "train"
    subsets: ["en-ar_SA", "en-zh_CN", "en-bn_IN", "en-de_DE", "en-fr_FR", "en-ja_JP", "en-ko_KR", "en-pt_PT", "en-es_MX"] 
    defaults:
      batch_size: 128
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 998 #998
      filter_bad: false
      src_lang: "English" 
      include_comet: false

  polymath:
    benchmark_type: "polymath"
    dataset_name: "Qwen/PolyMath"
    split: "top" #should be top, high, medium, or low
    subsets: ["zh", "bn", "en", "de", "ar", "fr", "ja", "ko", "pt", "es"]
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 400 #400

  mulr:
    benchmark_type: "mulr"
    dataset_name: "mulr"
    subsets: ["en", "de", "zh", "fr", "ja", "ko", "pt", "es"] #["zh", "cs", "nl", "en", "et", "fr", "de", "ja", "ko", "fa", "pt", "ru", "es", "sv", "uk"] 
    defaults:
      batch_size: 64
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 90

  aime2025:
    benchmark_type: "aime2025"
    dataset_name: "MathArena/aime_2025"
    split: "train"
    subsets: ["default"]
    defaults:
      batch_size: 30
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0

  absencebench:
    benchmark_type: "absencebench"
    dataset_name: "harveyfin/AbsenceBench"
    split: "validation"
    subsets: ["github_prs"] #, "numerical", "github_prs"]
    defaults:
      batch_size: 32
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 2000