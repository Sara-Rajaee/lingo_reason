  gpqa:
    benchmark_type: "gpqa"
    dataset_name: "Idavidrein/gpqa"
    split: "train"
    subsets: ["gpqa_diamond"]
  aime2025:
    benchmark_type: "aime2025"
    dataset_name: "MathArena/aime_2025"
    split: "train"
    subsets: ["default"]
    defaults:
      batch_size: 30
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0

  absencebench:
    benchmark_type: "absencebench"
    dataset_name: "harveyfin/AbsenceBench"
    split: "validation"
    subsets: ["poetry", "numerical", "github_prs"]
    defaults:
      batch_size: 32
      max_new_tokens: 8192
      temperature: 0.0
      top_p: 1.0
      limit_per_subset: 2000
